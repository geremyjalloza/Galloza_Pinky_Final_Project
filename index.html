<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pinky</title>
  <style>
    .medium-btn {
      width: 50px;
      height: 30px;
      font-size: 10px;
      color: #ff00aa;
      background-color: #CC338b
    }
  </style>
  <style>
    .piano-btn {
      width: 35px;
      height: 100px;
      font-size: 20px;
      margin-left: -5px;
      margin-right: -5px;
      margin-top: 10px;
      margin-bottom: 10px;
      color: #ff00aa;
      background-color: #CC338b;
      z-index: 1;
    }
  </style>
  <style>
    .piano-blk-btn {
      width: 25px;
      height: 60px;
      font-size: 18px;
      margin: -5px;
      color: #ff00aa;
      background-color: #cc088b;
      z-index: 2;
    }
  </style>
  <style>
    .pink-txt{
      color: #ff00aa
    }
  </style>
  <!-- Load the main JavaScript module -->
  <script type="module" src="script.js"></script>
</head>
<body>
<h1 class = "pink-txt"> Pinky! </h1>

<!-- Piano keyboard buttons for one octave (C to C, including sharps) -->
<div>
  <button class="piano-btn">C</button>
  <button class="piano-blk-btn">C#</button>
  <button class="piano-btn">D</button>
  <button class="piano-blk-btn">D#</button>
  <button class="piano-btn">E</button>
  <button class="piano-btn">F</button>
  <button class="piano-blk-btn">F#</button>
  <button class="piano-btn">G</button>
  <button class="piano-blk-btn">G#</button>
  <button class="piano-btn">A</button>
  <button class="piano-blk-btn">A#</button>
  <button class="piano-btn">B</button>
  <button class="piano-btn">C</button>  <!-- Octave higher C -->
</div>

<!-- Volume control section -->
<div>
  <!-- Volume slider label -->
  <label for="volSlider">Volume</label>

  <!-- Range slider: -70 dB (quiet) to +6 dB (loud) -->
  <input id="volSlider" type="range" value="-70" min="-70" max="6">
  <!-- Display current volume value in decibels full scale (dBFS) -->
  <label for="volSlider" id="volLabel"> -70.0 dBFS</label>


</div>
<!--attack control -->
<div>
<label for="attackSlider">Attack</label>
<!-- Range slider: 0 sec (instant attack) to 5 sec (slow swell) -->
<input id="attackSlider" type="range" value="0.2" step = "0.01" min="0" max="5">
<!-- Display current attack value in seconds (sec.) -->
<label for="attackSlider" id="attackLabel"> 0.2 sec.</label>
</div>

<!--decay control -->
<div>
  <label for="decaySlider">Decay</label>
  <!-- Range slider: 0 sec (instant attack) to 5 sec (slow swell) -->
  <input id="decaySlider" type="range" value="0.1" step = "0.01" min="0" max="5">
  <!-- Display current attack value in seconds (sec.) -->
  <label for="decaySlider" id="decayLabel"> 0.1 sec.</label>
</div>

<!--sustain control -->
<div>
  <label for="susSlider">Sustain</label>
  <!-- Range slider: 0 sec (instant attack) to 5 sec (slow swell) -->
  <input id="susSlider" type="range" value="5" min="0" max="50">
  <!-- Display current attack value in seconds (sec.) -->
  <label for="susSlider" id="susLabel"> 0.5 sec.</label>
</div>

<!--release control -->
<div>
  <label for="relSlider">Release</label>
  <!-- Range slider: 0 sec (instant attack) to 5 sec (slow swell) -->
  <input id="relSlider" type="range" value="5" step = "0.01" min="0" max="10">
  <!-- Display current attack value in seconds (sec.) -->
  <label for="relSlider" id="relLabel"> 5 sec.</label>
</div>
<div>
  <button class ="medium-btn" id="kick" >Kick</button>
  <button class ="medium-btn" id="snare">Snare</button>
  <button class ="medium-btn" id="hat">Hat</button>
  <button class ="medium-btn" id="bass">Bass</button>
  <button class ="medium-btn" id="open hat">Open Hat</button>
</div>
</body>
</html>
